# Configuración Nixpacks para Railway.
# Le dice qué PHP usar, qué instalar y cómo construir antes de arrancar.

providers = ['php', 'node']

[phases.setup]
nixPkgs = [
    'php84',
    'php84Extensions.pdo_mysql',
    'php84Extensions.mbstring',
    'php84Extensions.gd',
    'php84Extensions.zip',
    'php84Extensions.bcmath',
    'php84Packages.composer',
    'nodejs_20',
]

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]
