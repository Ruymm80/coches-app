# Configuración Nixpacks para Railway.
# Le dice qué PHP usar, qué instalar y cómo construir antes de arrancar.

providers = ['php', 'node']

[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo_mysql', 'php83Extensions.mbstring', 'php83Extensions.gd', 'php83Extensions.zip', 'php83Packages.composer', 'nodejs_20']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --prefer-dist',
    'npm ci',
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
]
